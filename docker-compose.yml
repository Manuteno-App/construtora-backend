version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: construtora_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-construtora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-construtora_pass}
      POSTGRES_DB: ${POSTGRES_DB:-construtora_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U construtora -d construtora_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: construtora_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
